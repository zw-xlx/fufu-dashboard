<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>福福资产日报</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: #fafafa;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  color: #1a1a1a;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
body { padding: 28px 16px 40px; }
.container { max-width: 680px; margin: 0 auto; }

.header {
  padding-bottom: 14px;
  margin-bottom: 20px;
  border-bottom: 1px solid #e5e5e5;
}
.title {
  font-size: clamp(18px, 4.4vw, 22px);
  color: #111;
  font-weight: 600;
  letter-spacing: -0.3px;
}
.subtitle {
  font-size: clamp(12px, 3vw, 13px);
  color: #888;
  margin-top: 4px;
}
.date {
  font-size: clamp(12px, 3vw, 13px);
  color: #888;
  margin-top: 2px;
}

.summary {
  margin-bottom: 24px;
  padding: 6px 0 18px;
}
.summary .label {
  font-size: 12px;
  color: #888;
  margin-bottom: 6px;
  letter-spacing: 0.3px;
}
.summary .big {
  font-size: clamp(30px, 8vw, 40px);
  font-weight: 600;
  color: #111;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.5px;
}
.summary .updated {
  font-size: 11px;
  color: #aaa;
  margin-top: 6px;
}

.section-title {
  font-size: clamp(13px, 3.2vw, 14px);
  color: #666;
  font-weight: 500;
  margin: 26px 0 10px;
  letter-spacing: 0.3px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-variant-numeric: tabular-nums;
}
th {
  padding: 10px 8px;
  text-align: left;
  font-size: 11px;
  color: #999;
  font-weight: 500;
  letter-spacing: 0.3px;
  border-bottom: 1px solid #e5e5e5;
  text-transform: uppercase;
}
th:nth-child(3), th:nth-child(4), th:last-child { text-align: right; }
td {
  padding: 12px 8px;
  font-size: clamp(12px, 3.2vw, 14px);
  border-bottom: 1px solid #f0f0f0;
  vertical-align: middle;
}
td:nth-child(3), td:nth-child(4), td:last-child { text-align: right; }
.asset-name { font-weight: 500; color: #111; }
.price-cell { color: #888; font-size: clamp(11px, 2.8vw, 12px); }
.val-cell { color: #111; font-weight: 500; }
.pct-cell { color: #666; font-size: clamp(11px, 2.8vw, 12px); }
.qty-cell { color: #555; }
.total-row td {
  padding: 14px 8px;
  font-weight: 600;
  color: #111;
  font-size: clamp(13px, 3.4vw, 15px);
  border-bottom: 0;
  border-top: 1.5px solid #111;
}

.monthly-wrap {
  margin-bottom: 10px;
}
.m-row {
  display: grid;
  grid-template-columns: 72px 1fr 74px 48px;
  gap: 10px;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #f0f0f0;
  font-size: clamp(12px, 3vw, 13px);
}
.m-row:last-child { border-bottom: 0; }
.m-month {
  color: #666;
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}
.m-bar-wrap {
  position: relative;
  height: 14px;
  background: #f0f0f0;
  border-radius: 2px;
  overflow: hidden;
}
.m-bar {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: #333;
  border-radius: 2px;
  transition: width 0.4s ease;
}
.m-bar.highest {
  background: #16a34a;
}
.m-val {
  text-align: right;
  font-variant-numeric: tabular-nums;
  color: #111;
  font-weight: 500;
  font-size: 12px;
}
.m-count {
  color: #aaa;
  text-align: right;
  font-variant-numeric: tabular-nums;
  font-size: 11px;
}
.m-summary {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid #e5e5e5;
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #666;
}
.m-summary .diff-up { color: #16a34a; font-weight: 500; }
.m-summary .diff-down { color: #dc2626; font-weight: 500; }

.loading { padding: 20px 0; color: #888; font-size: 13px; text-align: center; }
.error {
  background: #fef2f2;
  border: 1px solid #fecaca;
  color: #991b1b;
  padding: 12px;
  border-radius: 6px;
  margin: 10px 0;
  font-size: 13px;
}

.footer {
  text-align: center;
  color: #bbb;
  font-size: 11px;
  margin-top: 40px;
  padding-top: 16px;
  border-top: 1px solid #eee;
  line-height: 1.6;
}

@media (max-width: 480px) {
  body { padding: 20px 12px 32px; }
  th, td { padding: 10px 4px; }
  th { font-size: 10px; }
}

@media (prefers-color-scheme: dark) {
  html, body { background: #0f0f0f; color: #e5e5e5; }
  .title, .summary .big, .asset-name, .val-cell, .total-row td { color: #f5f5f5; }
  .header, .total-row td { border-color: #333; }
  th { color: #888; border-color: #2a2a2a; }
  td, .m-row, .m-summary { border-color: #222 !important; }
  .price-cell, .qty-cell, .pct-cell { color: #999; }
  .m-bar-wrap { background: #1f1f1f; }
  .m-bar { background: #e5e5e5; }
  .m-bar.highest { background: #22c55e; }
  .m-val { color: #f5f5f5; }
  .footer { color: #555; border-color: #222; }
  .summary .updated, .subtitle, .date { color: #777; }
  .error { background: #2a1515; border-color: #5a2020; color: #fca5a5; }
}
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="title">福福资产日报</div>
    <div class="subtitle" id="subtitle">加载中…</div>
    <div class="date" id="date"></div>
  </div>

  <div class="summary">
    <div class="label">总资产 (CNY)</div>
    <div class="big" id="total-cny">¥ ---</div>
    <div class="updated" id="updated">更新中…</div>
  </div>

  <div id="content">
    <div class="loading">加载中…</div>
  </div>

  <div class="section-title">月度均值</div>
  <div class="monthly-wrap" id="monthly"></div>

  <div class="footer">
    <div>CoinGecko · 东方财富 · gold-api · exchangerate-api</div>
    <div>每日 10:00 (Asia/Shanghai) 更新</div>
  </div>

</div>

<script>
async function load() {
  try {
    const res = await fetch('./data.json?t=' + Date.now());
    if (!res.ok) throw new Error('data.json 加载失败');
    const d = await res.json();
    render(d);
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="error">加载失败：' + e.message + '</div>';
  }
}

function fmt(n, decimals = 0) {
  return Number(n).toLocaleString('zh-CN', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals
  });
}

function render(d) {
  document.getElementById('subtitle').textContent = '福福 · ' + d.age;
  document.getElementById('date').textContent = d.date;
  document.getElementById('total-cny').textContent = '¥ ' + fmt(d.total_cny);
  document.getElementById('updated').textContent = '最后更新：' + d.updated_at;

  let rows = '';
  d.assets.forEach(a => {
    rows += `
      <tr>
        <td class="asset-name">${a.name}</td>
        <td class="qty-cell">${a.qty_display}</td>
        <td class="price-cell">${a.price_display || '—'}</td>
        <td class="val-cell">¥${fmt(a.value_cny)}</td>
        <td class="pct-cell">${a.pct.toFixed(1)}%</td>
      </tr>`;
  });
  rows += `
    <tr class="total-row">
      <td colspan="3">总计</td>
      <td>¥${fmt(d.total_cny)}</td>
      <td>100%</td>
    </tr>`;

  document.getElementById('content').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>资产</th><th>数量</th><th>单价</th><th>估值</th><th>占比</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;

  renderMonthly(d.monthly || []);
}

function renderMonthly(monthly) {
  const el = document.getElementById('monthly');
  if (!monthly.length) {
    el.innerHTML = '<div class="loading">暂无数据</div>';
    return;
  }

  const maxAvg = Math.max(...monthly.map(m => m.avg));
  const minAvg = Math.min(...monthly.map(m => m.avg));
  const base = minAvg * 0.92;
  const range = maxAvg - base;

  const rows = monthly.map(m => {
    const pct = range > 0 ? ((m.avg - base) / range) * 100 : 100;
    const isHigh = m.avg === maxAvg;
    const wan = (m.avg / 10000).toFixed(1);
    return `
      <div class="m-row">
        <div class="m-month">${m.month}</div>
        <div class="m-bar-wrap">
          <div class="m-bar ${isHigh ? 'highest' : ''}" style="width:${Math.max(8, pct)}%"></div>
        </div>
        <div class="m-val">¥${wan}万</div>
        <div class="m-count">n=${m.count}</div>
      </div>`;
  }).join('');

  const allAvg = monthly.reduce((s, m) => s + m.avg * m.count, 0)
    / monthly.reduce((s, m) => s + m.count, 0);
  const diff = monthly.length >= 2
    ? monthly[monthly.length - 1].avg - monthly[0].avg
    : 0;
  const diffClass = diff >= 0 ? 'diff-up' : 'diff-down';
  const diffStr = diff >= 0
    ? `+¥${(diff / 10000).toFixed(2)}万`
    : `-¥${(Math.abs(diff) / 10000).toFixed(2)}万`;

  el.innerHTML = rows + `
    <div class="m-summary">
      <span>整体均值 ¥${(allAvg / 10000).toFixed(1)}万</span>
      <span class="${diffClass}">首月→本月 ${diffStr}</span>
    </div>`;
}

load();
</script>

</body>
</html>
